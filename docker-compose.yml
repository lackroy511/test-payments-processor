services:
  payments_processor_db:
    image: postgres:18
    container_name: test-payments-processor-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbit:
    image: rabbitmq:4.3.2-management
    container_name: test-payments-processor-rabbit
    env_file:
      - .env
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  payments_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-payments-processor-api
    command: python src/payments_api/main.py
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      payments_processor_db:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    restart: unless-stopped

  payments_publisher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-payments-processor-publisher
    command: python src/payments_publisher/main.py
    env_file:
      - .env
    depends_on:
      payments_processor_db:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    restart: unless-stopped

  payments_consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-payments-processor-consumer
    command: python src/payments_consumer/main.py
    env_file:
      - .env
    depends_on:
      payments_processor_db:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
